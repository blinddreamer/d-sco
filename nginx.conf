server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /news {
        try_files /index.html =404;
    }

    error_page 404 /404;
    location /404 {
        try_files /index.html =404;
        internal;
    }

    # Optional: cache static assets
    location ~* \.(mp4|css|js|jpg|png|woff2?)$ {
        expires 30d;
        access_log off;
    }
}
